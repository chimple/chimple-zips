name: Deploy All Zips to chimple-bundles

on:
  push:
    branches:
      - unzip-workflow-patch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-22.04

    env:
      NODE_OPTIONS: --max-old-space-size=4096
      FIREBASE_HOSTING_UPLOAD_CONCURRENCY: 5
      PROJECT_ID: chimple-prod
      HOSTING_TARGET: chimple-bundles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Clean public folder before extraction
        run: |
          rm -rf public
          mkdir -p public

      - name: Extract all zip files
        run: bash scripts/extract_asset_zips.sh ALL

      - name: Check extracted files
        id: extracted
        run: |
          FILE_COUNT=$(find public -type f | wc -l | tr -d ' ')
          echo "Extracted files: $FILE_COUNT"
          echo "count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$FILE_COUNT" = "0" ]; then
            echo "No files extracted. Skipping deploy."
            exit 0
          fi

          echo "Public folder size:"
          du -sh public

          echo "Top-level folders:"
          find public -mindepth 1 -maxdepth 1 -type d | wc -l

          echo "Largest files:"
          find public -type f -printf '%s %p\n' | sort -nr | head -20

      - name: Setup Node.js
        if: steps.extracted.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        if: steps.extracted.outputs.count != '0'
        run: npm install -g firebase-tools@13.29.1

      - name: Show Firebase CLI version
        if: steps.extracted.outputs.count != '0'
        run: firebase --version

      - name: Deploy extracted files to Firebase Hosting
        if: steps.extracted.outputs.count != '0'
        run: |
          set +e

          firebase deploy \
            --only hosting:${HOSTING_TARGET} \
            --project ${PROJECT_ID} \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive

          STATUS=$?

          if [ "$STATUS" -eq 0 ]; then
            echo "Firebase deploy succeeded."
            exit 0
          fi

          echo "First Firebase deploy failed with exit code $STATUS."
          echo "Retrying once with debug log saved to firebase-debug.log..."

          firebase deploy \
            --only hosting:${HOSTING_TARGET} \
            --project ${PROJECT_ID} \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive \
            --debug > firebase-debug.log 2>&1

          RETRY_STATUS=$?

          if [ "$RETRY_STATUS" -ne 0 ]; then
            echo "Firebase deploy retry failed with exit code $RETRY_STATUS."
            echo "Last 200 lines of firebase-debug.log:"
            tail -200 firebase-debug.log
            exit "$RETRY_STATUS"
          fi

          echo "Firebase deploy retry succeeded."

      - name: Upload Firebase debug log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-debug-log
          path: firebase-debug.log
          if-no-files-found: ignore
