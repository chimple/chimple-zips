name: Deploy All Zips to chimple-bundles

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      FIREBASE_CLI_PREVIEWS: hostingchannels

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Clean public folder
        run: |
          rm -rf public
          mkdir -p public

      - name: Extract all zip files
        run: bash scripts/extract_asset_zips.sh ALL

      - name: Remove zip files from public folder
        run: |
          find public -type f -name "*.zip" -delete

      - name: Check extracted files
        id: extracted
        run: |
          FILE_COUNT=$(find public -type f | wc -l | tr -d ' ')
          echo "Extracted files: $FILE_COUNT"
          echo "count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$FILE_COUNT" = "0" ]; then
            echo "No files extracted. Skipping deploy."
            exit 0
          fi

          echo "Public folder size:"
          du -sh public

          echo "Largest files:"
          find public -type f -printf '%s %p\n' | sort -nr | head -20

      - name: Setup Node.js
        if: steps.extracted.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        if: steps.extracted.outputs.count != '0'
        run: npm install -g firebase-tools@13.35.1

      - name: Deploy extracted files to Firebase Hosting
        if: steps.extracted.outputs.count != '0'
        run: |
          firebase deploy \
            --only hosting:chimple-bundles \
            --project chimple-prod \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive \
            --debug
