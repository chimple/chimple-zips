name: Deploy Zips to R2

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "*.zip"
      - "**/*.zip"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy-r2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve R2 environment
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            echo "R2_BUCKET_NAME=${{ secrets.R2_DEV_BUCKET_NAME }}" >> "$GITHUB_ENV"
            echo "R2_ACCOUNT_ID=${{ secrets.R2_DEV_ACCOUNT_ID }}" >> "$GITHUB_ENV"
            echo "R2_ACCESS_KEY_ID=${{ secrets.R2_DEV_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
            echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_DEV_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "R2_BUCKET_NAME=${{ secrets.R2_PROD_BUCKET_NAME }}" >> "$GITHUB_ENV"
            echo "R2_ACCOUNT_ID=${{ secrets.R2_PROD_ACCOUNT_ID }}" >> "$GITHUB_ENV"
            echo "R2_ACCESS_KEY_ID=${{ secrets.R2_PROD_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
            echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_PROD_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          else
            echo "Unsupported branch: ${GITHUB_REF}"
            exit 1
          fi

      - name: Validate R2 configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${R2_BUCKET_NAME:-}" ] || \
             [ -z "${R2_ACCOUNT_ID:-}" ] || \
             [ -z "${R2_ACCESS_KEY_ID:-}" ] || \
             [ -z "${R2_SECRET_ACCESS_KEY:-}" ]; then
            echo "Missing required R2 configuration."
            exit 1
          fi

          echo "R2_ENDPOINT=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Find merged PR and collect ZIP files
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          : > changed_zips.txt
          : > deleted_zips.txt

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git ls-files '*.zip' > changed_zips.txt
          else
            repo="${{ github.repository }}"
            commit_sha="${{ github.sha }}"

            pr_number="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${repo}/commits/${commit_sha}/pulls" \
                --jq '.[0].number'
            )"

            if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
              echo "No merged PR found for commit ${commit_sha}"
              exit 0
            fi

            echo "Using PR #${pr_number}"

            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${repo}/pulls/${pr_number}/files" \
              --paginate \
              --jq '.[] | select(.filename | endswith(".zip")) | .filename' \
              > changed_zips.txt

            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${repo}/pulls/${pr_number}/files" \
              --paginate \
              --jq '.[] | select(.status == "removed" and (.filename | endswith(".zip"))) | .filename' \
              > deleted_zips.txt

            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${repo}/pulls/${pr_number}/files" \
              --paginate \
              --jq '.[] | select(.status == "renamed" and (.previous_filename | endswith(".zip"))) | .previous_filename' \
              >> deleted_zips.txt
          fi

          sort -u changed_zips.txt -o changed_zips.txt
          sort -u deleted_zips.txt -o deleted_zips.txt

          echo "ZIP files found:"
          cat changed_zips.txt || true

          echo "ZIP files to delete from R2:"
          cat deleted_zips.txt || true

      - name: Upload ZIP files to R2
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s changed_zips.txt ]; then
            echo "No ZIP files found."
            exit 0
          fi

          rm -rf r2-upload
          mkdir -p r2-upload

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            if [ -f "$file" ]; then
              echo "Staging $file"
              mkdir -p "r2-upload/$(dirname "$file")"
              cp "$file" "r2-upload/$file"
            else
              echo "WARNING: File not found: $file"
            fi
          done < changed_zips.txt

          echo "Checking staged ZIP files..."

          zip_count=$(find r2-upload -type f -name '*.zip' | wc -l)

          echo "ZIP files staged: $zip_count"

          if [ "$zip_count" -eq 0 ]; then
            echo "No local ZIP files were available to upload."
            exit 0
          fi

          echo "Uploading ZIP files to R2..."
          echo "Bucket: $R2_BUCKET_NAME"
          AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
          aws s3 sync r2-upload "s3://${R2_BUCKET_NAME}" \
            --exclude "*" \
            --include "*.zip" \
            --endpoint-url "$R2_ENDPOINT" \
            --region auto \
            --no-progress

          echo "Upload completed."

      - name: Delete removed ZIP files from R2
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s deleted_zips.txt ]; then
            echo "No ZIP files to delete from R2."
            exit 0
          fi

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "Deleting s3://${R2_BUCKET_NAME}/${file}"
            AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            aws s3 rm "s3://${R2_BUCKET_NAME}/${file}" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto \
              --no-progress
          done < deleted_zips.txt

          
