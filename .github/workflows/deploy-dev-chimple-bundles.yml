name: Deploy Zips to chimple-bundles-dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Run extract script
        run: bash scripts/extract_asset_zips.sh || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upload extracted files using update-single-file (DEV BUNDLES)
        run: |
          cat > firebase-token-adc.json <<EOF
          {
            "type": "authorized_user",
            "client_id": "563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com",
            "client_secret": "j9iVZfS8kkCEFUPaAeJV0sAi",
            "refresh_token": "${FIREBASE_TOKEN}"
          }
          EOF
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/firebase-token-adc.json"

          npm install google-auth-library debug minimist

          FILES=$(find public -type f)

          if [ -z "$FILES" ]; then
            echo "No extracted files to upload. Skipping deploy."
            exit 0
          fi

          echo "Uploading files:"
          echo "$FILES"

          node scripts/update-single-file.cjs --project=cuba-stage --site=chimple-bundles-dev $FILES
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Cleanup credentials
        if: always()
        run: rm -f firebase-token-adc.json
