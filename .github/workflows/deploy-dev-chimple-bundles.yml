name: Deploy Zips to chimple-zip-bundles-dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract all zip files
        run: bash scripts/extract_asset_zips.sh ALL

      - name: Check extracted files
        id: extracted
        run: |
          FILE_COUNT=$(find public -type f | wc -l)
          echo "Extracted files: $FILE_COUNT"
          echo "count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.extracted.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upload extracted files using update-single-file (DEV BUNDLES)
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_KEY_PROD }}" | base64 --decode > serviceAccountKey.json
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/serviceAccountKey.json"

          npm install google-auth-library debug minimist

          FILES=$(find public -type f)

          if [ -z "$FILES" ]; then
            echo "No extracted files to upload. Skipping deploy."
            exit 0
          fi

          echo "Uploading files:"
          echo "$FILES"

          node scripts/update-single-file.cjs --project=chimple-prod --site=chimple-zip-bundles-dev $FILES

      - name: Cleanup credentials
        if: always()
        run: rm -f serviceAccountKey.json