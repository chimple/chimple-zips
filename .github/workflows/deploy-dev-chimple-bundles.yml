name: Deploy All Zips to chimple-bundles.web

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract all zip files
        run: bash scripts/extract_asset_zips.sh ALL

      - name: Check extracted files
        id: extracted
        run: |
          FILE_COUNT=$(find public -type f | wc -l)
          echo "Extracted files: $FILE_COUNT"
          echo "count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.extracted.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        if: steps.extracted.outputs.count != '0'
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        if: steps.extracted.outputs.count != '0'
        run: firebase deploy --only hosting:chimple-bundles.web --project cuba-stage --token "${{ secrets.FIREBASE_TOKEN }}"
