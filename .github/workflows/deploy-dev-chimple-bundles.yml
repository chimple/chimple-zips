name: Deploy Zips to chimple-bundles-dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Run extract script
        run: bash scripts/extract_asset_zips.sh || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:chimple-bundles-dev --project=cuba-stage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
