name: Deploy Zips to chimple-bundles-dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Prepare public folder
        run: |
          rm -rf public
          mkdir -p public

          for zipfile in *.zip; do
            [ -e "$zipfile" ] || continue
            name=$(basename "$zipfile" .zip)
            target="public/$name"
            mkdir -p "$target"
            unzip -o "$zipfile" -d "$target" || true
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:chimple-bundles-dev --project=cuba-stage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
